services:
  promptshield-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promptshield-gateway
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PROMPTSHIELD_PORT: "8080"
      PROMPTSHIELD_ENGINE_URL: "http://promptshield-engine:4321"
      PROMPTSHIELD_ENGINE_API_KEY: "${PROMPTSHIELD_ENGINE_API_KEY:?set PROMPTSHIELD_ENGINE_API_KEY in .env.local}"
      PROMPTSHIELD_ADMIN_TOKEN: "${PROMPTSHIELD_ADMIN_TOKEN:-dev-gateway-admin-token}"
      PROMPTSHIELD_POLICY_PATH: "/policy/policy.yaml"
    volumes:
      - promptshield_policy:/policy
    ports:
      - "8080:8080"
    networks:
      - promptshield
    depends_on:
      promptshield-redis:
        condition: service_healthy
        required: false

  # Optional Redis service ie only needed for HA multi-instance deployments.
  promptshield-redis:
    image: redis:7-alpine
    container_name: promptshield-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 128mb --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    networks:
      - promptshield
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - ha  # only starts with: docker compose --profile ha up

networks:
  promptshield:
    external: true
    name: promptshield

volumes:
  promptshield_policy:
    external: true
    name: promptshield_policy
