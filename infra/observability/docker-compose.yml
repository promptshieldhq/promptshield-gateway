services:
  prometheus:
    image: prom/prometheus:latest
    container_name: promptshield-prometheus
    ports:
      - "9090:9090"
    volumes:
      # Mount infra/observability/ so prometheus.yml can reference
      # grafana/alerts.yml via a relative path in rule_files.
      - .:/etc/prometheus:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      # --web.enable-lifecycle removed: exposes unauthenticated /-/reload and admin endpoints
    extra_hosts:
      # Allows Prometheus inside Docker to reach PromptShield on the host.
      # Works on Docker Desktop (Mac/Windows) and Linux.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: promptshield-grafana
    ports:
      - "3001:3000"
    environment:
      # Override these before deploying to a shared/production server.
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      # Auto-provision the Prometheus datasource and the PromptShield dashboard
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana-data:
