# PromptShield — nginx TLS terminator
# Replace your.domain.com with your actual domain.
#
# Obtain a certificate first:
#   sudo certbot --nginx -d your.domain.com
#
# Then install this file:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/promptshield
#   sudo ln -s /etc/nginx/sites-available/promptshield /etc/nginx/sites-enabled/promptshield
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name your.domain.com;

    ssl_certificate     /etc/letsencrypt/live/your.domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header Referrer-Policy           "no-referrer"                                  always;

    # SSE streaming: disable buffering so chunks are flushed immediately.
    proxy_buffering    off;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep-alive between nginx and the gateway.
        proxy_set_header   Connection        "";
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your.domain.com;
    return 301 https://$host$request_uri;
}
