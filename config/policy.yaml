# PromptShield proxy policy
# actions: allow | mask | block

pii_min_score: 0.70

pii:
  # Financial & Identity
  CREDIT_CARD: block
  US_SSN: block
  IBAN_CODE: block
  US_BANK_NUMBER: block
  US_ITIN: mask
  US_PASSPORT: block
  US_DRIVER_LICENSE: block
  CRYPTO: block
  MEDICAL_LICENSE: block

  # Contact
  EMAIL_ADDRESS: block
  PHONE_NUMBER: mask
  IP_ADDRESS: mask
  URL: allow

  # Identity
  PERSON: allow
  ORG: allow
  LOCATION: allow
  DATE_TIME: allow
  AGE: allow


injection:
  action: block

on_detector_error: fail_closed

# Token budgets — rolling cumulative limits per window.
# key_by: "global" (shared across all users) | "ip" | "api_key"
# token_budget:
#   daily:
#     tokens: 100000
#     key_by: api_key
#   weekly:
#     tokens: 500000
#     key_by: api_key
#   monthly:
#     tokens: 1000000
#     key_by: api_key
